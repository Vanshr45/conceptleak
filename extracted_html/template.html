<script src="10ebbbb4-10ef-49de-a50c-c6595b0d04a6" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg-base: #0a0a0f;
    --bg-surface: #111118;
    --bg-elevated: #1a1a24;
    --bg-hover: #1f1f2c;
    --border: #2a2a3a;
    --border-strong: #3a3a4e;
    --text-primary: #f0f0ff;
    --text-secondary: #8888aa;
    --text-muted: #44445a;
    --accent: #f97316;
    --accent-dim: #c2410c;
    --critical: #ef4444;
    --high: #f97316;
    --medium: #eab308;
    --low: #22c55e;
    --groq: #3b82f6;
  }
  html, body, #root { background: var(--bg-base); color: var(--text-primary); }
  body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .tabular { font-variant-numeric: tabular-nums; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 8px; border: 2px solid var(--bg-base); }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a4e; }

  /* Animations */
  @keyframes pulseGlowRed {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.45), 0 0 24px rgba(239,68,68,0.25); }
    50% { box-shadow: 0 0 0 12px rgba(239,68,68,0), 0 0 48px rgba(239,68,68,0.55); }
  }
  .pulse-critical { animation: pulseGlowRed 2.2s ease-in-out infinite; }
  @keyframes textGlowRed {
    0%, 100% { text-shadow: 0 0 24px rgba(239,68,68,0.35), 0 0 48px rgba(239,68,68,0.2); }
    50% { text-shadow: 0 0 36px rgba(239,68,68,0.65), 0 0 72px rgba(239,68,68,0.4); }
  }
  .text-glow-critical { animation: textGlowRed 2.2s ease-in-out infinite; }
  @keyframes ringPulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.35); opacity: 0; }
  }
  .ring-pulse { animation: ringPulse 2s ease-out infinite; }

  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.85); }
  }
  .pulse-dot { animation: pulseDot 1.4s ease-in-out infinite; }

  @keyframes scanLine {
    0% { transform: translateY(-20%); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(520%); opacity: 0; }
  }
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #f97316 20%, #f97316 80%, transparent);
    box-shadow: 0 0 24px #f97316, 0 0 48px rgba(249,115,22,0.5);
    animation: scanLine 2.4s cubic-bezier(.4,0,.2,1) infinite;
  }
  @keyframes scanFlash {
    0% { background: rgba(249,115,22,0); }
    50% { background: rgba(249,115,22,0.15); }
    100% { background: rgba(34,197,94,0); }
  }
  .scan-flash { animation: scanFlash 0.8s ease-out; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .slide-up { animation: slideUp 0.6s cubic-bezier(.2,.9,.3,1.2) both; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.35s ease-out both; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }

  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .cursor-blink { animation: blink 1s steps(1) infinite; }

  @keyframes floatY {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .float-y { animation: floatY 3.2s ease-in-out infinite; }

  /* Finding card lift */
  .finding-card { transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
  .finding-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }

  /* Custom focus rings */
  button:focus-visible, [role="button"]:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }

  /* Code block */
  pre.code-block {
    background: #07070c; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; overflow-x: auto; font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px; line-height: 1.55; color: #d5d5ee;
  }
  .tok-k { color: #c084fc; } /* keyword */
  .tok-s { color: #86efac; } /* string */
  .tok-n { color: #f9a8d4; } /* number */
  .tok-f { color: #60a5fa; } /* function */
  .tok-c { color: #556; font-style: italic; } /* comment */
  .tok-v { color: #fde68a; } /* var */

  /* Utility background classes */
  .bg-base { background: var(--bg-base); }
  .bg-surface { background: var(--bg-surface); }
  .bg-elevated { background: var(--bg-elevated); }
  .bg-hover { background: var(--bg-hover); }
  .border-app { border-color: var(--border); }
  .border-app-strong { border-color: var(--border-strong); }
  .text-pri { color: var(--text-primary); }
  .text-sec { color: var(--text-secondary); }
  .text-muted { color: var(--text-muted); }
  .text-accent { color: var(--accent); }
  .bg-accent { background: var(--accent); }

  /* Message bubble subtle border */
  .msg-user { background: rgba(249,115,22,0.10); border: 1px solid rgba(249,115,22,0.32); }
  .msg-ai { background: var(--bg-surface); border: 1px solid var(--border); }

  /* Sidebar active indicator */
  .nav-active::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px;
    background: var(--accent); border-radius: 0 3px 3px 0;
  }
</style>
</head>
